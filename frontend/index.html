<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA / Theme -->
  <meta name="theme-color" content="#0a0d0f" />
  <meta name="background-color" content="#0a0d0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FieldTrack" />
  <meta name="application-name" content="FieldTrack" />
  <meta name="msapplication-TileColor" content="#0a0d0f" />
  <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

  <!-- SEO / Description -->
  <meta name="description" content="FieldTrack — Field staff tracking, orders, and performance management for Kenya agri-businesses." />

  <!-- Open Graph (WhatsApp link previews) -->
  <meta property="og:title" content="FieldTrack Kenya" />
  <meta property="og:description" content="Field staff management — live tracking, orders, targets & reports" />
  <meta property="og:image" content="/icons/icon-512x512.png" />
  <meta property="og:type" content="website" />

  <title>FieldTrack Kenya</title>

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Splash screens for iOS (optional but nice) -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
